worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include mime.types;

    # Dev cluster — mirrors your prod nodejs_cluster
    # Points to dev containers instead of app1/app2/app3
    upstream dev_nodejs_cluster {
        least_conn;
        server dev-app-container-1:3000;
        server dev-app-container-2:3000;
        server dev-app-container-3:3000;
    }

    server {
        listen 9080;
        server_name localhost;

        # API → dev Node cluster
        location /api/ {
            proxy_pass http://dev_nodejs_cluster/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Frontend → same static files as production
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri /index.html;
        }

        # Admin → dev admin container
        location /admin/ {
            proxy_pass http://dev-admin-container:3000/;
            proxy_set_header Host $host;
        }
    }
}